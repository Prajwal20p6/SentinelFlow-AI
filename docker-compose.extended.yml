version: '3.8'

services:
  # Existing services (backend, frontend, postgres, redis, qdrant)
  
  # NEW: Mastra Service
  mastra-service:
    build:
      context: ./mastra-service
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      PYTHON_BACKEND_URL: http://backend:8000
      PYTHON_BACKEND_API_KEY: ${PYTHON_BACKEND_API_KEY}
      QDRANT_URL: http://qdrant:6333
      MASTRA_OPENAI_API_KEY: ${MASTRA_OPENAI_API_KEY}
      MASTRA_ANTHROPIC_API_KEY: ${MASTRA_ANTHROPIC_API_KEY}
      MASTRA_GOOGLE_API_KEY: ${MASTRA_GOOGLE_API_KEY}
    depends_on:
      - backend
      - qdrant
    networks:
      - sentinelflow
    restart: unless-stopped

networks:
  sentinelflow:
    driver: bridge
