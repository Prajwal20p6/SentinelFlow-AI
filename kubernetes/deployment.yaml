apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentinelflow-api
  namespace: default
  labels:
    app: sentinelflow-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: sentinelflow-api
  template:
    metadata:
      labels:
        app: sentinelflow-api
    spec:
      containers:
      - name: api
        image: sentinelflow-api:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: sentinelflow-secrets
              key: database-url
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: sentinelflow-secrets
              key: secret-key
        - name: ENCRYPTION_KEY
          valueFrom:
            secretKeyRef:
              name: sentinelflow-secrets
              key: encryption-key
        - name: REDIS_URL
          valueFrom:
            configMapKeyRef:
              name: sentinelflow-config
              key: redis-url
        - name: QDRANT_HOST
          valueFrom:
            configMapKeyRef:
              name: sentinelflow-config
              key: qdrant-host
        - name: ENVIRONMENT
          value: "production"
        - name: DEBUG
          value: "false"
        livenessProbe:
          httpGet:
            path: /api/v1/health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 30
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /api/v1/ready
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 15
          timeoutSeconds: 5
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 1Gi
